<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilização do APP — Fornecedores de Ambulância</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}
:root{
  --orange:#E8590C;
  --green:#1A4731;
  --green-light:#2a6644;
  --cat-a:#16a34a;--cat-a-bg:#dcfce7;--cat-a-text:#14532d;
  --cat-b:#2563eb;--cat-b-bg:#dbeafe;--cat-b-text:#1e3a8a;
  --cat-c:#d97706;--cat-c-bg:#fef3c7;--cat-c-text:#78350f;
  --cat-d:#ea580c;--cat-d-bg:#ffedd5;--cat-d-text:#7c2d12;
  --cat-f:#dc2626;--cat-f-bg:#fee2e2;--cat-f-text:#7f1d1d;
}

/* HEADER */
header{background:var(--green);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo-area h1{color:#fff;font-size:1.15rem;font-weight:700;line-height:1.2}
.logo-area p{color:rgba(255,255,255,.7);font-size:.75rem;margin-top:2px}
.header-stats{display:flex;gap:16px;flex-wrap:wrap}
.hstat{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 16px;text-align:center}
.hstat-n{color:#fff;font-size:1.3rem;font-weight:700}
.hstat-l{color:rgba(255,255,255,.75);font-size:.68rem;text-transform:uppercase;letter-spacing:.04em}

/* TOOLBAR */
.toolbar{background:#fff;padding:14px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.toolbar input{flex:1;min-width:200px;padding:8px 14px;border:1.5px solid #cbd5e1;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.85rem;outline:none;transition:border .2s}
.toolbar input:focus{border-color:var(--green)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border:1.5px solid #cbd5e1;border-radius:20px;background:#fff;font-family:'Poppins',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s;font-weight:500}
.filter-btn:hover{border-color:var(--green);color:var(--green)}
.filter-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.filter-btn.cat-a.active{background:var(--cat-a);border-color:var(--cat-a)}
.filter-btn.cat-b.active{background:var(--cat-b);border-color:var(--cat-b)}
.filter-btn.cat-c.active{background:var(--cat-c);border-color:var(--cat-c)}
.filter-btn.cat-d.active{background:var(--cat-d);border-color:var(--cat-d)}
.filter-btn.cat-f.active{background:var(--cat-f);border-color:var(--cat-f)}

/* CARDS GRID */
main{padding:24px 32px;max-width:1400px;margin:0 auto}
.results-info{font-size:.8rem;color:#64748b;margin-bottom:16px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#fff;border-radius:12px;border:1.5px solid #e2e8f0;padding:18px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.card.cat-a::before{background:var(--cat-a)}
.card.cat-b::before{background:var(--cat-b)}
.card.cat-c::before{background:var(--cat-c)}
.card.cat-d::before{background:var(--cat-d)}
.card.cat-f::before{background:var(--cat-f)}
.card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,71,49,.12)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:8px}
.card-name{font-size:.82rem;font-weight:600;color:#1e293b;line-height:1.35;flex:1}
.cat-badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0;letter-spacing:.04em}
.cat-badge.cat-a{background:var(--cat-a-bg);color:var(--cat-a-text)}
.cat-badge.cat-b{background:var(--cat-b-bg);color:var(--cat-b-text)}
.cat-badge.cat-c{background:var(--cat-c-bg);color:var(--cat-c-text)}
.cat-badge.cat-d{background:var(--cat-d-bg);color:var(--cat-d-text)}
.cat-badge.cat-f{background:var(--cat-f-bg);color:var(--cat-f-text)}
.card-pct{font-size:1.8rem;font-weight:700;margin-bottom:2px}
.cat-a .card-pct{color:var(--cat-a)}
.cat-b .card-pct{color:var(--cat-b)}
.cat-c .card-pct{color:var(--cat-c)}
.cat-d .card-pct{color:var(--cat-d)}
.cat-f .card-pct{color:var(--cat-f)}
.card-pct-label{font-size:.72rem;color:#94a3b8;margin-bottom:12px}
.pct-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:14px}
.pct-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.cat-a .pct-bar-fill{background:var(--cat-a)}
.cat-b .pct-bar-fill{background:var(--cat-b)}
.cat-c .pct-bar-fill{background:var(--cat-c)}
.cat-d .pct-bar-fill{background:var(--cat-d)}
.cat-f .pct-bar-fill{background:var(--cat-f)}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cstat{background:#f8fafc;border-radius:6px;padding:6px 8px;text-align:center}
.cstat-n{font-size:1rem;font-weight:700;color:#1e293b}
.cstat-l{font-size:.65rem;color:#94a3b8;margin-top:1px}

/* MODAL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}

/* MODAL */
.modal{background:#fff;border-radius:16px;width:100%;max-width:860px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2);position:relative}
.modal-header{background:var(--green);padding:20px 28px;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10}
.modal-header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.modal-title{color:#fff;font-size:1rem;font-weight:700;line-height:1.35;flex:1}
.modal-close{background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.modal-close:hover{background:rgba(255,255,255,.35)}
.modal-cat-row{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.modal-cat-badge{padding:5px 16px;border-radius:20px;font-size:.8rem;font-weight:700;letter-spacing:.04em}
.modal-pct-text{color:rgba(255,255,255,.9);font-size:.85rem}

/* USABILITY METER */
.uso-meter{background:#e8f5ee;border-radius:12px;padding:16px 20px;margin:20px 24px 0}
.uso-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.uso-label{font-size:.78rem;color:#4b7a5e;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.uso-pct-big{font-size:1.5rem;font-weight:700}
.uso-bar-outer{height:10px;background:#c8e6d4;border-radius:5px;overflow:hidden}
.uso-bar-inner{height:100%;border-radius:5px;transition:width .5s}
.uso-legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.uso-leg-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:#4b7a5e}
.uso-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* MODAL BODY */
.modal-body{padding:0 24px 24px}
.section-title{font-size:.75rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 10px}

/* SUMMARY GRID */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.scard{background:#f8fafc;border-radius:10px;padding:12px 14px;border:1px solid #e2e8f0}
.scard-icon{font-size:1.2rem;margin-bottom:4px}
.scard-n{font-size:1.25rem;font-weight:700;color:#1e293b}
.scard-sub{display:flex;gap:8px;margin-top:3px}
.scard-sim{font-size:.7rem;color:#16a34a;font-weight:600}
.scard-nao{font-size:.7rem;color:#dc2626;font-weight:600}
.scard-l{font-size:.7rem;color:#94a3b8;margin-top:2px}

/* ALERT BOX */
.alert-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:10px 14px;margin-top:12px;display:flex;align-items:center;gap:8px;font-size:.78rem;color:#9a3412}
.alert-box strong{font-weight:600}

/* MONTH ACCORDION */
.month-list{display:flex;flex-direction:column;gap:8px}
.month-item{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.month-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;cursor:pointer;background:#f8fafc;transition:background .15s}
.month-header:hover{background:#f1f5f9}
.month-name{font-size:.82rem;font-weight:600;color:#334155}
.month-total{font-size:.78rem;color:#64748b}
.month-arrow{font-size:.8rem;color:#94a3b8;transition:transform .2s}
.month-item.open .month-arrow{transform:rotate(180deg)}
.month-body{display:none;padding:12px 16px;background:#fff;border-top:1px solid #e2e8f0}
.month-item.open .month-body{display:block}
.month-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.mstat{background:#f8fafc;border-radius:8px;padding:8px 10px;border:1px solid #e2e8f0}
.mstat-label{font-size:.65rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mstat-vals{display:flex;gap:8px;align-items:baseline}
.mstat-sim{font-size:.88rem;font-weight:700;color:#16a34a}
.mstat-nao{font-size:.88rem;font-weight:700;color:#dc2626}
.mstat-alert{font-size:.7rem;color:#ea580c;margin-top:3px;font-weight:600}

/* CATEGORY LEGEND */
.cat-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cl-item{display:flex;align-items:center;gap:6px;font-size:.72rem;color:#475569}
.cl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

.no-results{text-align:center;padding:60px 20px;color:#94a3b8}
.no-results p{font-size:1rem;margin-top:8px}
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <h1>📡 Monitoramento de Utilização do APP</h1>
    <p>Fornecedores de Ambulância — Painel de Acompanhamento</p>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍  Buscar fornecedor..." oninput="render()">
  <div class="filter-group">
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn cat-a" data-cat="A" onclick="setFilter('A',this)">Categoria A</button>
    <button class="filter-btn cat-b" data-cat="B" onclick="setFilter('B',this)">Categoria B</button>
    <button class="filter-btn cat-c" data-cat="C" onclick="setFilter('C',this)">Categoria C</button>
    <button class="filter-btn cat-d" data-cat="D" onclick="setFilter('D',this)">Categoria D</button>
    <button class="filter-btn cat-f" data-cat="F" onclick="setFilter('F',this)">Categoria F</button>
  </div>
</div>

<main>
  <div class="results-info" id="resultsInfo"></div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <span style="font-size:2.5rem">🔍</span>
    <p>Nenhum fornecedor encontrado para os filtros selecionados.</p>
  </div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader">
      <div class="modal-header-top">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div class="modal-cat-row" id="modalCatRow"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const RAW = </script>
<script src="data.js"></script>
<script>
// Use inline data if data.js not loaded (for single-file use)
const DATA = typeof SUPPLIERS_DATA !== 'undefined' ? SUPPLIERS_DATA : {};

let activeFilter = 'all';

function getCategory(pct){
  if(pct>=92)return'A';
  if(pct>=82)return'B';
  if(pct>=72)return'C';
  if(pct>=62)return'D';
  return'F';
}
function getCatColor(cat){
  return{A:'cat-a',B:'cat-b',C:'cat-c',D:'cat-d',F:'cat-f'}[cat];
}
function getCatLabel(cat){
  return{A:'CATEGORIA A',B:'CATEGORIA B',C:'CATEGORIA C',D:'CATEGORIA D',F:'CATEGORIA F'}[cat];
}
function getCatBgColor(cat){
  return{
    A:'#16a34a',B:'#2563eb',C:'#d97706',D:'#ea580c',F:'#dc2626'
  }[cat];
}

function setFilter(cat, btn){
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function initHeader(){
  const total = Object.keys(DATA).length;
  const totalAtt = Object.values(DATA).reduce((s,v)=>s+v.total,0);
  const cats={A:0,B:0,C:0,D:0,F:0};
  Object.values(DATA).forEach(v=>{cats[getCategory(v.usabilidade)]++;});
  const el = document.getElementById('headerStats');
  el.innerHTML = `
    <div class="hstat"><div class="hstat-n">${total}</div><div class="hstat-l">Fornecedores</div></div>
    <div class="hstat"><div class="hstat-n">${totalAtt.toLocaleString('pt-BR')}</div><div class="hstat-l">Atendimentos</div></div>
    <div class="hstat"><div class="hstat-n" style="color:#86efac">${cats.A+cats.B}</div><div class="hstat-l">Cat. A+B (≥82%)</div></div>
    <div class="hstat"><div class="hstat-n" style="color:#fca5a5">${cats.F}</div><div class="hstat-l">Cat. F (&lt;62%)</div></div>
  `;
}

function render(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const grid = document.getElementById('cardsGrid');
  const noRes = document.getElementById('noResults');
  const info = document.getElementById('resultsInfo');

  const entries = Object.entries(DATA).filter(([name,v])=>{
    const cat = getCategory(v.usabilidade);
    const matchCat = activeFilter==='all' || cat===activeFilter;
    const matchQ = !q || name.toLowerCase().includes(q);
    return matchCat && matchQ;
  }).sort((a,b)=>b[1].usabilidade - a[1].usabilidade);

  info.textContent = `Exibindo ${entries.length} fornecedor${entries.length!==1?'es':''} de ${Object.keys(DATA).length} total`;

  if(!entries.length){
    grid.innerHTML='';
    noRes.style.display='block';
    return;
  }
  noRes.style.display='none';

  grid.innerHTML = entries.map(([name,v])=>{
    const cat = getCategory(v.usabilidade);
    const cc = getCatColor(cat);
    return`<div class="card ${cc}" onclick="openModal('${name.replace(/'/g,"\\'")}')">
      <div class="card-header">
        <div class="card-name">${name}</div>
        <span class="cat-badge ${cc}">${getCatLabel(cat)}</span>
      </div>
      <div class="card-pct">${v.usabilidade}%</div>
      <div class="card-pct-label">usabilidade</div>
      <div class="pct-bar"><div class="pct-bar-fill" style="width:${v.usabilidade}%"></div></div>
      <div class="card-stats">
        <div class="cstat"><div class="cstat-n">${v.total}</div><div class="cstat-l">Atendimentos</div></div>
        <div class="cstat"><div class="cstat-n">${v.token_sim}</div><div class="cstat-l">Tokens SIM</div></div>
        <div class="cstat"><div class="cstat-n">${v.horario_sim}</div><div class="cstat-l">Horário APP SIM</div></div>
        <div class="cstat"><div class="cstat-n">${v.com_rastreio}</div><div class="cstat-l">Com Rastreio</div></div>
      </div>
    </div>`;
  }).join('');
}

function openModal(name){
  const v = DATA[name];
  if(!v)return;
  const cat = getCategory(v.usabilidade);
  const cc = getCatColor(cat);
  const bg = getCatBgColor(cat);

  // Header
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalCatRow').innerHTML = `
    <span class="modal-cat-badge" style="background:${bg}20;color:${bg};">${getCatLabel(cat)}</span>
    <span class="modal-pct-text">Usabilidade: <strong>${v.usabilidade}%</strong></span>
    <span class="modal-pct-text">Total de Atendimentos: <strong>${v.total}</strong></span>
  `;

  // Meter color
  const meterColor = bg;

  // Alert token_sim_sem_rastreio
  const alertHtml = v.token_sim_sem_rastreio > 0
    ? `<div class="alert-box">⚠️ <span><strong>${v.token_sim_sem_rastreio} atendimento(s)</strong> com TOKEN SIM mas <strong>sem pontos de rastreio</strong></span></div>`
    : `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:.78rem;color:#166534;display:flex;align-items:center;gap:8px">✅ <span>Nenhum atendimento com TOKEN SIM sem rastreio</span></div>`;

  // Months
  const meses = Object.entries(v.meses).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const monthsHtml = meses.map(([mn,m])=>{
    const alertM = m.token_sim_sem_rastreio > 0
      ? `<div class="mstat-alert">⚠️ ${m.token_sim_sem_rastreio} TOKEN SIM s/ rastreio</div>`:'';
    return`<div class="month-item" id="mi_${mn}">
      <div class="month-header" onclick="toggleMonth('mi_${mn}')">
        <span class="month-name">📅 ${m.label}</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="month-total">${m.total} atendimentos</span>
          <span class="month-arrow">▼</span>
        </div>
      </div>
      <div class="month-body">
        <div class="month-row">
          <div class="mstat">
            <div class="mstat-label">Token Registrado</div>
            <div class="mstat-vals">
              <span class="mstat-sim">✓ ${m.token_sim}</span>
              <span class="mstat-nao">✗ ${m.token_nao}</span>
            </div>
          </div>
          <div class="mstat">
            <div class="mstat-label">Horário via APP</div>
            <div class="mstat-vals">
              <span class="mstat-sim">✓ ${m.horario_sim}</span>
              <span class="mstat-nao">✗ ${m.horario_nao}</span>
            </div>
          </div>
          <div class="mstat">
            <div class="mstat-label">Pontos de Rastreio</div>
            <div class="mstat-vals">
              <span class="mstat-sim">✓ ${m.com_rastreio}</span>
              <span class="mstat-nao">✗ ${m.sem_rastreio}</span>
            </div>
          </div>
          <div class="mstat">
            <div class="mstat-label">Token s/ Rastreio</div>
            <div class="mstat-vals">
              <span style="font-size:.88rem;font-weight:700;color:${m.token_sim_sem_rastreio>0?'#ea580c':'#16a34a'}">${m.token_sim_sem_rastreio}</span>
            </div>
            ${alertM}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <div class="uso-meter">
      <div class="uso-top">
        <span class="uso-label">Índice de Usabilidade</span>
        <span class="uso-pct-big" style="color:${meterColor}">${v.usabilidade}%</span>
      </div>
      <div class="uso-bar-outer">
        <div class="uso-bar-inner" style="width:${v.usabilidade}%;background:${meterColor}"></div>
      </div>
      <div class="uso-legend">
        <div class="uso-leg-item"><div class="uso-leg-dot" style="background:#16a34a"></div>A: 100–92%</div>
        <div class="uso-leg-item"><div class="uso-leg-dot" style="background:#2563eb"></div>B: 91–82%</div>
        <div class="uso-leg-item"><div class="uso-leg-dot" style="background:#d97706"></div>C: 81–72%</div>
        <div class="uso-leg-item"><div class="uso-leg-dot" style="background:#ea580c"></div>D: 71–62%</div>
        <div class="uso-leg-item"><div class="uso-leg-dot" style="background:#dc2626"></div>F: 61–0%</div>
      </div>
    </div>

    <div style="padding:0 4px">
      <div class="section-title">Resumo Geral</div>
      <div class="summary-grid">
        <div class="scard">
          <div class="scard-icon">📋</div>
          <div class="scard-n">${v.total}</div>
          <div class="scard-l">Total de Atendimentos</div>
        </div>
        <div class="scard">
          <div class="scard-icon">🔑</div>
          <div class="scard-n">${v.token_sim + v.token_nao}</div>
          <div class="scard-sub"><span class="scard-sim">✓ ${v.token_sim} SIM</span><span class="scard-nao">✗ ${v.token_nao} NÃO</span></div>
          <div class="scard-l">Tokens Registrados</div>
        </div>
        <div class="scard">
          <div class="scard-icon">🕐</div>
          <div class="scard-n">${v.horario_sim + v.horario_nao}</div>
          <div class="scard-sub"><span class="scard-sim">✓ ${v.horario_sim} SIM</span><span class="scard-nao">✗ ${v.horario_nao} NÃO</span></div>
          <div class="scard-l">Horários via APP</div>
        </div>
        <div class="scard">
          <div class="scard-icon">📍</div>
          <div class="scard-n">${v.com_rastreio + v.sem_rastreio}</div>
          <div class="scard-sub"><span class="scard-sim">✓ ${v.com_rastreio} c/ rastreio</span><span class="scard-nao">✗ ${v.sem_rastreio} s/ rastreio</span></div>
          <div class="scard-l">Pontos de Rastreio</div>
        </div>
      </div>
      ${alertHtml}

      <div class="section-title" style="margin-top:22px">Detalhe por Mês</div>
      <div class="month-list">${monthsHtml}</div>
    </div>
  `;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function toggleMonth(id){
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function closeModal(e){
  if(e.target===document.getElementById('overlay'))closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModalDirect();});

initHeader();
render();
</script>
</body>
</html>
