<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilização do APP — Fornecedores de Ambulância</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;background:#f4f6f9;color:#1a1a2e;min-height:100vh}
:root{
  --green:#1A4731;--green-light:#2a6644;
  --ca:#16a34a;--ca-bg:#dcfce7;--ca-t:#14532d;
  --cb:#2563eb;--cb-bg:#dbeafe;--cb-t:#1e3a8a;
  --cc:#d97706;--cc-bg:#fef3c7;--cc-t:#78350f;
  --cd:#ea580c;--cd-bg:#ffedd5;--cd-t:#7c2d12;
  --cf:#dc2626;--cf-bg:#fee2e2;--cf-t:#7f1d1d;
}
header{background:var(--green);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.logo h1{color:#fff;font-size:1.1rem;font-weight:700;line-height:1.2}
.logo p{color:rgba(255,255,255,.65);font-size:.72rem;margin-top:2px}
.hstats{display:flex;gap:12px;flex-wrap:wrap}
.hs{background:rgba(255,255,255,.12);border-radius:8px;padding:8px 14px;text-align:center}
.hs-n{color:#fff;font-size:1.25rem;font-weight:700}
.hs-l{color:rgba(255,255,255,.7);font-size:.65rem;text-transform:uppercase;letter-spacing:.04em}

.toolbar{background:#fff;padding:12px 32px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:100;box-shadow:0 2px 6px rgba(0,0,0,.05)}
.toolbar input{flex:1;min-width:180px;padding:8px 14px;border:1.5px solid #cbd5e1;border-radius:8px;font-family:'Poppins',sans-serif;font-size:.83rem;outline:none;transition:border .2s}
.toolbar input:focus{border-color:var(--green)}
.fbtns{display:flex;gap:6px;flex-wrap:wrap}
.fb{padding:6px 12px;border:1.5px solid #cbd5e1;border-radius:20px;background:#fff;font-family:'Poppins',sans-serif;font-size:.75rem;cursor:pointer;transition:all .2s;font-weight:500}
.fb:hover{border-color:var(--green);color:var(--green)}
.fb.on{color:#fff}
.fb.on.fall{background:var(--green);border-color:var(--green)}
.fb.on.fa{background:var(--ca);border-color:var(--ca)}
.fb.on.fb2{background:var(--cb);border-color:var(--cb)}
.fb.on.fc{background:var(--cc);border-color:var(--cc)}
.fb.on.fd{background:var(--cd);border-color:var(--cd)}
.fb.on.ff{background:var(--cf);border-color:var(--cf)}

main{padding:20px 32px;max-width:1400px;margin:0 auto}
.ri{font-size:.78rem;color:#64748b;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}

.card{background:#fff;border-radius:12px;border:1.5px solid #e2e8f0;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.card.ca::before{background:var(--ca)}.card.cb::before{background:var(--cb)}
.card.cc::before{background:var(--cc)}.card.cd::before{background:var(--cd)}.card.cf::before{background:var(--cf)}
.card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,71,49,.1)}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.cn{font-size:.8rem;font-weight:600;color:#1e293b;line-height:1.35;flex:1}
.cbadge{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.cbadge.ca{background:var(--ca-bg);color:var(--ca-t)}.cbadge.cb{background:var(--cb-bg);color:var(--cb-t)}
.cbadge.cc{background:var(--cc-bg);color:var(--cc-t)}.cbadge.cd{background:var(--cd-bg);color:var(--cd-t)}.cbadge.cf{background:var(--cf-bg);color:var(--cf-t)}
.cpct{font-size:1.75rem;font-weight:700}
.ca .cpct{color:var(--ca)}.cb .cpct{color:var(--cb)}.cc .cpct{color:var(--cc)}.cd .cpct{color:var(--cd)}.cf .cpct{color:var(--cf)}
.cpct-l{font-size:.68rem;color:#94a3b8;margin-bottom:10px}
.pbar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:12px}
.pbfill{height:100%;border-radius:3px}
.ca .pbfill{background:var(--ca)}.cb .pbfill{background:var(--cb)}.cc .pbfill{background:var(--cc)}.cd .pbfill{background:var(--cd)}.cf .pbfill{background:var(--cf)}
.cstats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cs{background:#f8fafc;border-radius:6px;padding:5px 4px;text-align:center}
.cs-n{font-size:.92rem;font-weight:700;color:#1e293b}
.cs-l{font-size:.6rem;color:#94a3b8;margin-top:1px;line-height:1.2}
.cpills{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px}
.cpill{font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:600}
.cpill.web{background:#ede9fe;color:#5b21b6}
.cpill.inc{background:#fff7ed;color:#9a3412}
.cpill.sloc{background:#fef3c7;color:#78350f}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:900px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.mhdr{background:var(--green);padding:18px 24px;border-radius:16px 16px 0 0;position:sticky;top:0;z-index:10}
.mhdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.mtitle{color:#fff;font-size:.95rem;font-weight:700;line-height:1.35;flex:1}
.mclose{background:rgba(255,255,255,.2);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.mclose:hover{background:rgba(255,255,255,.35)}
.mcat-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.mcat-badge{padding:4px 14px;border-radius:20px;font-size:.75rem;font-weight:700}
.mcat-info{color:rgba(255,255,255,.85);font-size:.78rem}
.mbody{padding:0 20px 24px}

/* USABILIDADE */
.umeter{background:#e8f5ee;border-radius:12px;padding:14px 18px;margin:18px 0 0}
.utop{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ulabel{font-size:.72rem;color:#4b7a5e;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.upct{font-size:1.4rem;font-weight:700}
.ubar{height:10px;background:#c8e6d4;border-radius:5px;overflow:hidden}
.ubar-fill{height:100%;border-radius:5px}
.uleg{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.uleg-i{display:flex;align-items:center;gap:4px;font-size:.68rem;color:#4b7a5e}
.uleg-d{width:9px;height:9px;border-radius:50%}

.sec-title{font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;margin:18px 0 8px}

/* BREAKDOWN CARDS */
.breakdown{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px}
.bk{border-radius:10px;padding:12px 14px;border:1px solid}
.bk.correct{background:#f0fdf4;border-color:#bbf7d0}
.bk.sem-loc{background:#fefce8;border-color:#fde68a}
.bk.inconsist{background:#fff7ed;border-color:#fed7aa}
.bk.web{background:#f5f3ff;border-color:#ddd6fe}
.bk.errado{background:#fef2f2;border-color:#fecaca}
.bk-icon{font-size:1rem;margin-bottom:3px}
.bk-n{font-size:1.2rem;font-weight:700}
.bk.correct .bk-n{color:#16a34a}.bk.sem-loc .bk-n{color:#d97706}
.bk.inconsist .bk-n{color:#ea580c}.bk.web .bk-n{color:#7c3aed}.bk.errado .bk-n{color:#dc2626}
.bk-label{font-size:.68rem;font-weight:700;margin-bottom:3px}
.bk.correct .bk-label{color:#14532d}.bk.sem-loc .bk-label{color:#78350f}
.bk.inconsist .bk-label{color:#7c2d12}.bk.web .bk-label{color:#4c1d95}.bk.errado .bk-label{color:#7f1d1d}
.bk-sub{font-size:.63rem;color:#94a3b8;line-height:1.4;margin-bottom:6px}

/* ATENDIMENTOS LIST */
.att-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.att-chip{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:.02em}
.att-chip.sloc{background:#fde68a;color:#78350f}
.att-chip.inc{background:#fed7aa;color:#7c2d12}
.att-chip.web{background:#ddd6fe;color:#4c1d95}
.att-more{font-size:.68rem;color:#94a3b8;align-self:center;font-style:italic}

/* MONTHS */
.month-list{display:flex;flex-direction:column;gap:6px}
.mi{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden}
.mih{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;cursor:pointer;background:#f8fafc;transition:background .15s}
.mih:hover{background:#f1f5f9}
.mi-name{font-size:.8rem;font-weight:600;color:#334155}
.mi-right{display:flex;align-items:center;gap:10px}
.mi-total{font-size:.75rem;color:#64748b}
.mi-pct{font-size:.75rem;font-weight:700}
.mi-arr{font-size:.75rem;color:#94a3b8;transition:transform .2s}
.mi.open .mi-arr{transform:rotate(180deg)}
.mib{display:none;padding:10px 14px;background:#fff;border-top:1px solid #e2e8f0}
.mi.open .mib{display:block}
.mi-bk{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:6px;margin-bottom:8px}
.mbk{border-radius:8px;padding:8px 10px;border:1px solid}
.mbk.correct{background:#f0fdf4;border-color:#bbf7d0}.mbk.sem-loc{background:#fefce8;border-color:#fde68a}
.mbk.inconsist{background:#fff7ed;border-color:#fed7aa}.mbk.web{background:#f5f3ff;border-color:#ddd6fe}.mbk.errado{background:#fef2f2;border-color:#fecaca}
.mbk-lbl{font-size:.62rem;font-weight:700;margin-bottom:2px}
.mbk.correct .mbk-lbl{color:#14532d}.mbk.sem-loc .mbk-lbl{color:#78350f}
.mbk.inconsist .mbk-lbl{color:#7c2d12}.mbk.web .mbk-lbl{color:#4c1d95}.mbk.errado .mbk-lbl{color:#7f1d1d}
.mbk-n{font-size:1rem;font-weight:700}
.mbk.correct .mbk-n{color:#16a34a}.mbk.sem-loc .mbk-n{color:#d97706}
.mbk.inconsist .mbk-n{color:#ea580c}.mbk.web .mbk-n{color:#7c3aed}.mbk.errado .mbk-n{color:#dc2626}
.mbk-atts{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.mbk-chip{font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:5px}
.mbk-chip.sloc{background:#fde68a;color:#78350f}
.mbk-chip.inc{background:#fed7aa;color:#7c2d12}

.nodata{text-align:center;padding:50px 20px;color:#94a3b8}
</style>
</head>
<body>
<header>
  <div class="logo">
    <h1>📡 Monitoramento de Utilização do APP</h1>
    <p>Fornecedores de Ambulância — Painel de Acompanhamento</p>
  </div>
  <div class="hstats" id="hstats"></div>
</header>

<div class="toolbar">
  <input type="text" id="srch" placeholder="🔍  Buscar fornecedor..." oninput="render()">
  <div class="fbtns">
    <button class="fb fall on" onclick="setF('all',this)">Todos</button>
    <button class="fb fa" onclick="setF('A',this)">Cat. A</button>
    <button class="fb fb2" onclick="setF('B',this)">Cat. B</button>
    <button class="fb fc" onclick="setF('C',this)">Cat. C</button>
    <button class="fb fd" onclick="setF('D',this)">Cat. D</button>
    <button class="fb ff" onclick="setF('F',this)">Cat. F</button>
  </div>
</div>

<main>
  <div class="ri" id="ri"></div>
  <div class="grid" id="grid"></div>
  <div class="nodata" id="nodata" style="display:none"><span style="font-size:2.5rem">🔍</span><p>Nenhum fornecedor encontrado.</p></div>
</main>

<div class="ov" id="ov" onclick="closeOv(event)">
  <div class="modal" id="modal">
    <div class="mhdr">
      <div class="mhdr-top">
        <div class="mtitle" id="mtitle"></div>
        <button class="mclose" onclick="closeM()">✕</button>
      </div>
      <div class="mcat-row" id="mcatrow"></div>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
const D=typeof SUPPLIERS_DATA!=='undefined'?SUPPLIERS_DATA:{};
let activeF='all';

const CAT_CLR={A:'#16a34a',B:'#2563eb',C:'#d97706',D:'#ea580c',F:'#dc2626'};
function cat(p){return p>=92?'A':p>=82?'B':p>=72?'C':p>=62?'D':'F'}
function catCls(c){return{A:'ca',B:'cb',C:'cc',D:'cd',F:'cf'}[c]}

function initHeader(){
  const keys=Object.keys(D), vals=Object.values(D);
  const totalAtt=vals.reduce((s,v)=>s+v.total,0);
  const web=vals.reduce((s,v)=>s+v.web,0);
  const cats={A:0,B:0,C:0,D:0,F:0};
  vals.forEach(v=>cats[cat(v.usabilidade)]++);
  document.getElementById('hstats').innerHTML=`
    <div class="hs"><div class="hs-n">${keys.length}</div><div class="hs-l">Fornecedores</div></div>
    <div class="hs"><div class="hs-n">${totalAtt.toLocaleString('pt-BR')}</div><div class="hs-l">Atendimentos</div></div>
    <div class="hs"><div class="hs-n" style="color:#86efac">${cats.A+cats.B}</div><div class="hs-l">A+B ≥82%</div></div>
    <div class="hs"><div class="hs-n" style="color:#fca5a5">${cats.F}</div><div class="hs-l">Cat. F</div></div>
    <div class="hs"><div class="hs-n" style="color:#c4b5fd">${web}</div><div class="hs-l">Via WEB</div></div>`;
}

function setF(c,btn){
  activeF=c;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const q=document.getElementById('srch').value.trim().toLowerCase();
  const entries=Object.entries(D).filter(([n,v])=>{
    return(activeF==='all'||cat(v.usabilidade)===activeF)&&(!q||n.toLowerCase().includes(q));
  }).sort((a,b)=>b[1].usabilidade-a[1].usabilidade);

  document.getElementById('ri').textContent=`Exibindo ${entries.length} de ${Object.keys(D).length} fornecedores`;
  if(!entries.length){document.getElementById('grid').innerHTML='';document.getElementById('nodata').style.display='block';return;}
  document.getElementById('nodata').style.display='none';

  document.getElementById('grid').innerHTML=entries.map(([n,v])=>{
    const cl=catCls(cat(v.usabilidade));
    const pills=[
      v.web>0?`<span class="cpill web">🌐 ${v.web} WEB</span>`:'',
      v.inconsistencia>0?`<span class="cpill inc">⚠️ ${v.inconsistencia} Inconsist.</span>`:'',
      v.sem_localizacao>0?`<span class="cpill sloc">📍 ${v.sem_localizacao} Sem Loc.</span>`:'',
    ].filter(Boolean).join('');
    const safeN=n.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return`<div class="card ${cl}" onclick="openM('${safeN}')">
      <div class="ch"><div class="cn">${n}</div><span class="cbadge ${cl}">CAT. ${cat(v.usabilidade)}</span></div>
      <div class="cpct">${v.usabilidade}%</div>
      <div class="cpct-l">usabilidade · base: ${v.base} atend.</div>
      <div class="pbar"><div class="pbfill" style="width:${v.usabilidade}%"></div></div>
      <div class="cstats">
        <div class="cs"><div class="cs-n">${v.total}</div><div class="cs-l">Total</div></div>
        <div class="cs"><div class="cs-n" style="color:#16a34a">${v.correto}</div><div class="cs-l">Correto</div></div>
        <div class="cs"><div class="cs-n" style="color:#7c3aed">${v.web}</div><div class="cs-l">WEB</div></div>
        <div class="cs"><div class="cs-n" style="color:#dc2626">${v.errado+v.sem_localizacao+v.inconsistencia}</div><div class="cs-l">Erros</div></div>
      </div>
      ${pills?`<div class="cpills">${pills}</div>`:''}
    </div>`;
  }).join('');
}

/* render chips for attendance numbers */
function attChips(list, cls, max=20){
  if(!list||!list.length) return '<span style="font-size:.7rem;color:#94a3b8;font-style:italic">Nenhum</span>';
  const shown=list.slice(0,max);
  const extra=list.length-max;
  return shown.map(n=>`<span class="att-chip ${cls}">#${n}</span>`).join('')
    +(extra>0?`<span class="att-more">+${extra} mais</span>`:'');
}
function mChips(list, cls, max=10){
  if(!list||!list.length) return '';
  const shown=list.slice(0,max);
  const extra=list.length-max;
  return shown.map(n=>`<span class="mbk-chip ${cls}">#${n}</span>`).join('')
    +(extra>0?`<span style="font-size:.63rem;color:#94a3b8"> +${extra}</span>`:'');
}

function openM(name){
  const v=D[name];if(!v)return;
  const c=cat(v.usabilidade), cl=catCls(c), clr=CAT_CLR[c];

  document.getElementById('mtitle').textContent=name;
  document.getElementById('mcatrow').innerHTML=`
    <span class="mcat-badge" style="background:${clr}25;color:${clr}">CATEGORIA ${c}</span>
    <span class="mcat-info">Usabilidade: <strong>${v.usabilidade}%</strong></span>
    <span class="mcat-info">Total: <strong>${v.total}</strong></span>
    <span class="mcat-info">Base: <strong>${v.base}</strong></span>`;

  const meses=Object.entries(v.meses).sort((a,b)=>+a[0]-+b[0]);
  const mhtml=meses.map(([mn,m])=>{
    const mclr=CAT_CLR[cat(m.usabilidade)];
    const mSlocChips = mChips(m.att_sem_localizacao,'sloc');
    const mIncChips  = mChips(m.att_inconsistencia,'inc');
    return`<div class="mi" id="mi${mn}">
      <div class="mih" onclick="togM('mi${mn}')">
        <span class="mi-name">📅 ${m.label}</span>
        <div class="mi-right">
          <span class="mi-total">${m.total} atend.</span>
          <span class="mi-pct" style="color:${mclr}">${m.usabilidade}%</span>
          <span class="mi-arr">▼</span>
        </div>
      </div>
      <div class="mib">
        <div class="mi-bk">
          <div class="mbk correct"><div class="mbk-lbl">✅ CORRETO</div><div class="mbk-n">${m.correto}</div></div>
          <div class="mbk sem-loc">
            <div class="mbk-lbl">📍 SEM LOCALIZAÇÃO</div>
            <div class="mbk-n">${m.sem_localizacao}</div>
            ${mSlocChips?`<div class="mbk-atts">${mSlocChips}</div>`:''}
          </div>
          <div class="mbk inconsist">
            <div class="mbk-lbl">⚠️ INCONSISTÊNCIA</div>
            <div class="mbk-n">${m.inconsistencia}</div>
            ${mIncChips?`<div class="mbk-atts">${mIncChips}</div>`:''}
          </div>
          <div class="mbk web"><div class="mbk-lbl">🌐 VIA WEB</div><div class="mbk-n">${m.web}</div></div>
          <div class="mbk errado"><div class="mbk-lbl">❌ ERRADO</div><div class="mbk-n">${m.errado}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('mbody').innerHTML=`
    <div class="umeter">
      <div class="utop"><span class="ulabel">Índice de Usabilidade</span><span class="upct" style="color:${clr}">${v.usabilidade}%</span></div>
      <div class="ubar"><div class="ubar-fill" style="width:${v.usabilidade}%;background:${clr}"></div></div>
      <div class="uleg">
        <div class="uleg-i"><div class="uleg-d" style="background:#16a34a"></div>A 100–92%</div>
        <div class="uleg-i"><div class="uleg-d" style="background:#2563eb"></div>B 91–82%</div>
        <div class="uleg-i"><div class="uleg-d" style="background:#d97706"></div>C 81–72%</div>
        <div class="uleg-i"><div class="uleg-d" style="background:#ea580c"></div>D 71–62%</div>
        <div class="uleg-i"><div class="uleg-d" style="background:#dc2626"></div>F 0–61%</div>
      </div>
    </div>

    <div class="sec-title">Classificação dos Atendimentos</div>
    <div class="breakdown">
      <div class="bk correct">
        <div class="bk-icon">✅</div>
        <div class="bk-n">${v.correto}</div>
        <div class="bk-label">CORRETO</div>
        <div class="bk-sub">Token + Horário + Rastreio &gt;5 pts</div>
      </div>
      <div class="bk sem-loc">
        <div class="bk-icon">📍</div>
        <div class="bk-n">${v.sem_localizacao}</div>
        <div class="bk-label">SEM LOCALIZAÇÃO CAPTURADA</div>
        <div class="bk-sub">Token SIM + Horário SIM · rastreio ≤5 pts</div>
        <div class="att-list">${attChips(v.att_sem_localizacao,'sloc')}</div>
      </div>
      <div class="bk inconsist">
        <div class="bk-icon">⚠️</div>
        <div class="bk-n">${v.inconsistencia}</div>
        <div class="bk-label">INCONSISTÊNCIA</div>
        <div class="bk-sub">Token/Horário divergentes ou rastreio sem registro</div>
        <div class="att-list">${attChips(v.att_inconsistencia,'inc')}</div>
      </div>
      <div class="bk web">
        <div class="bk-icon">🌐</div>
        <div class="bk-n">${v.web}</div>
        <div class="bk-label">VIA WEB (fora da %)</div>

      </div>
      <div class="bk errado">

        <div class="bk-n">${v.errado}</div>
        <div class="bk-label">ERRADO</div>

    </div>

    <div class="sec-title">Detalhe por Mês</div>
    <div class="month-list">${mhtml}</div>`;

  document.getElementById('ov').classList.add('open');
  document.body.style.overflow='hidden';
}

function togM(id){document.getElementById(id).classList.toggle('open')}
function closeOv(e){if(e.target===document.getElementById('ov'))closeM()}
function closeM(){document.getElementById('ov').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM()});
initHeader();render();
</script>
